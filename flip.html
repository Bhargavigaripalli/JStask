 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipping</title>

    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;    
            align-items: center;       
           background-color: cornsilk;
        }

       
        .box{
            width: 400px;
            height: 400px;
            perspective: 1000px;  
        }
 
        .flip{
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: autoFlip 2s infinite linear;
        }

        
        .front, .back{
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: white;
            backface-visibility: hidden;
        }

        .front{
            background: blue;
        }

        .back{
            background: green;
            transform: rotateY(180deg);
        }

       
        @keyframes autoFlip{
            0%{
                transform: rotateY(0deg);
            }
            100%{
                transform: rotateY(360deg);
            }
        }

    </style>
</head>

<body>

    <div class="box">
        <div class="flip">
            <div class="front">Front</div>
            <div class="back">Back</div>
        </div>
    </div>

</body>
</html>
