<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #dcdcdc;
        }

        
        .navbar {
            height: 60px;
            background-color: #1f2a38;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .navbar h2 {
            font-size: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }
 
        .container {
            display: flex;
        }
 
        .sidebar {
            width: 220px;
            height: calc(100vh - 60px);
            background-color: #2f3e52;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 25px;
        }

        .sidebar a:hover {
            background-color: #3f5068;
        }
 
        .content {
            flex: 1;
            padding: 30px;
        }
 
        .cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 200px;
            height: 150px;
            background-color: red;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            font-size: 22px;
        }
    </style>
</head>
<body>
 
    <div class="navbar">
        <h2>MyDashboard</h2>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Profile</a>
            <a href="#">Logout</a>
        </div>
    </div>
 
    <div class="container">

    
        <div class="sidebar">
            <a href="#">Dashboard</a>
            <a href="#">Users</a>
            <a href="#">Reports</a>
            <a href="#">Settings</a>
        </div>
 
        <div class="content">
            <div class="cards">
                <div class="card">Card 1</div>
                <div class="card">Card 2</div>
                <div class="card">Card 3</div>
                <div class="card">Card 4</div>
            </div>
        </div>

    </div>

</body>
</html>
