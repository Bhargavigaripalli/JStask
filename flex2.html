<!DOCTYPE html>
<html>
<head>
    <title>Techno IT</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background:#042344;
            color:white;
        }

        /* Navbar */
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 60px;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
            color:white;
        }

        .logo span{
            background:#4da3ff;
            color:rgb(168, 129, 129);
            font-size:12px;
            padding:2px 6px;
            border-radius:4px;
            margin-left:5px;
        }

        .nav-links{
            display:flex;
            gap:30px;
            align-items:center;
        }

        .nav-links a{
            text-decoration:none;
            color:white;
            font-size:14px;
        }

        .nav-links a:hover{
            color:#4da3ff;
        }

        .btn{
            background:#1e66ff;
            padding:10px 20px;
            border-radius:25px;
            text-decoration:none;
            color:white;
            font-size:14px;
        }

        .btn:hover{
            background:#4da3ff;
        }

        
        .hero{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:50px 60px;
            min-height:80vh;
        }

        .hero img{
            width:850px;
            max-width:100%;
            height: 500px;
        }

        .hero-content{
            max-width:500px;
        }

        .hero-content h1{
            font-size:40px;
            margin-bottom:20px;
        }

        .hero-content h1 span{
            color:#4da3ff;
        }

        .hero-content p{
            font-size:15px;
            color:#cbd5e1;
            margin-bottom:25px;
            line-height:1.6;
        }

        .buttons{
            display:flex;
            gap:15px;
        }

        .btn-outline{
            background:transparent;
            border:1px solid #4da3ff;
            padding:10px 20px;
            border-radius:25px;
            color:#4da3ff;
            text-decoration:none;
        }

        .btn-outline:hover{
            background:#4da3ff;
            color:white;
        }

        /* Responsive */
        @media(max-width:900px){
            .hero{
                flex-direction:column;
                text-align:center;
            }

            .hero-content{
                margin-top:30px;
            }
        }
    </style>
</head>
<body>
 
    <div class="navbar">
        <div class="logo"> TechCore <span>IT</span></div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Services</a>
            <a href="#">Portfolio</a>
            <a href="#">Testimonials</a>
            <a href="#">Team</a>
            <a href="#">News</a>
            <a href="#" class="btn">Get Quotes</a>
        </div>
    </div>
 
    <div class="hero">
        <div>
            <img src="https://www.shutterstock.com/image-photo/create-sharp-image-artificial-intelligence-600nw-2656558377.jpg" alt="AI Robot">
        </div>

        <div class="hero-content">
            <h1>Excellence in Every Service <br><span>IT Solutions.</span></h1>

            <p>
                 Easily customize the design to match your brand. 
                 Built with flexibility and SEO optimization in mind.
            </p>

            <div class="buttons">
                <a href="#" class="btn">Get Quotes</a>
                <a href="#" class="btn-outline">Get Started</a>
            </div>
        </div>
    </div>

</body>
</html>
