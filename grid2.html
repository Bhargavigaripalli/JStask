<!DOCTYPE html>
<html>
<head>
    <title>Colours Grid Layout</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background: #f4f4f4;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .grid-container{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 200px 200px 200px;
            gap: 10px;
        }

        .grid-container img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
 
        .item1{
            grid-column: 1 / 2;
        }

        .item2{
            grid-column: 2 / 3;
        }

        .item3{
            grid-column: 3 / 4;
            grid-row: 1 / 3;
        }

        .item4{
            grid-column: 1 / 3;
            grid-row: 2 / 3;
        }

        .item5{
            grid-column: 1 / 2;
            grid-row: 3 / 4;
        }

        .item6{
            grid-column: 2 / 4;
            grid-row: 3 / 4;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <img src="https://images.pexels.com/photos/1191710/pexels-photo-1191710.jpeg?cs=srgb&dl=pexels-mccutcheon-1191710.jpg&fm=jpg" class="item1">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTj0hiM4-tk6YxDiELL8HKU9RvcKAlYhqlXBg&s" class="item2">
        <img src="https://png.pngtree.com/background/20250123/original/pngtree-beautiful-holi-festival-of-colors-splash-picture-image_15424970.jpg" class="item3">
        <img src="https://t4.ftcdn.net/jpg/16/94/59/95/360_F_1694599559_Ny0DeUWGsAn3ticvtZhX88wxDaTcKUxH.jpg" class="item4">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS9JQypF5susx4pRqvC2t7dAA15YGWxjZ8F2w&s" class="item5">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAlASGQzTtj_p9HSNrWGgqb9lqdsWygQo-aQ&s" class="item6">
    </div>

</body>
</html>
