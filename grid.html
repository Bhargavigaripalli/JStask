<!DOCTYPE html>
<html>
<head>
    <title>CSS Grid Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2f325c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 200px 200px 200px 200px;
            grid-template-rows: 120px 120px 120px;
            gap: 10px;
        }

        .box {
            border: 4px solid #1e2147;
        }

        .green {
            background: #6dbb4f;
        }

        .red {
            background: #ef2d2d;
        }

        .yellow {
            background: #f4ae2b;
        }
        .left-tall {
            grid-row: 1 / 4;
            grid-column: 1 / 2;
        }

        .top-long {
            grid-column: 2 / 4;
            grid-row: 1 / 2;
        }

        .top-right {
            grid-column: 4 / 5;
            grid-row: 1 / 2;
        }

        .middle-left {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
        }

        .middle-right {
            grid-column: 3 / 4;
            grid-row: 2 / 3;
        }

        .bottom-left {
            grid-column: 2 / 3;
            grid-row: 3 / 4;
        }

        .bottom-right {
            grid-column: 3 / 4;
            grid-row: 3 / 4;
        }

        .right-tall {
            grid-column: 4 / 5;
            grid-row: 2 / 4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box green left-tall"></div>
        <div class="box green top-long"></div>
        <div class="box red top-right"></div>
        <div class="box yellow middle-left"></div>
        <div class="box red middle-right"></div>
        <div class="box red bottom-left"></div>
        <div class="box yellow bottom-right"></div>
        <div class="box green right-tall"></div>
    </div>

</body>
</html>
